<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rising Rupees</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#0a0a0a;
  color:#f5f5f5;
  overflow-x:hidden;
}

/* SMOOTH SCROLL */
html {
  scroll-behavior: smooth;
}

/* SECTION */
.section{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

/* BACKGROUND */
.bg{
  position:absolute;
  width:100%;
  height:120%;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  filter:brightness(0.5);
  transition: transform 6s ease;
}

.section:hover .bg{
  transform:scale(1.2);
}

/* OVERLAY */
.overlay{
  position:relative;
  z-index:2;
  padding:40px;
  backdrop-filter: blur(10px);
}

/* TEXT */
h1{
  font-size:60px;
  letter-spacing:2px;
}

p{
  margin-top:10px;
  opacity:0.8;
  font-size:18px;
}

/* GOLD ACCENT */
.gold{
  color:#c9a34e;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- SCENE 1 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1559526324-593bc073d938')"></div>
  <div class="overlay fade">
    <h1>RISING <span class="gold">RUPEES</span></h1>
    <p>The new era of Indian power</p>
  </div>
</section>

<!-- SCENE 2 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1507679799987-c73779587ccf')"></div>
  <div class="overlay fade">
    <h1>MARKETS MOVE</h1>
    <p>Fortunes rise. Empires fall.</p>
  </div>
</section>

<!-- SCENE 3 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c')"></div>
  <div class="overlay fade">
    <h1>WEALTH IS <span class="gold">ENGINEERED</span></h1>
    <p>For those who understand the system</p>
  </div>
</section>

<!-- SCENE 4 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')"></div>
  <div class="overlay fade">
    <h1>INDIA IS RISING</h1>
    <p>Not growing. Accelerating.</p>
  </div>
</section>

<!-- SCENE 5 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')"></div>
  <div class="overlay fade">
    <h1>THIS IS A <span class="gold">MOVEMENT</span></h1>
    <p>Not just content</p>
  </div>
</section>

<script>
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

faders.forEach(el => observer.observe(el));
</script>

</body>
</html>
