<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rising Rupees</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- SMOOTH SCROLL -->
<script src="https://unpkg.com/lenis@1.0.6/dist/lenis.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#0a0a0a;
  color:#f5f5f5;
  overflow-x:hidden;
}

/* SECTION */
.section{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* BACKGROUND LAYER */
.bg{
  position:absolute;
  width:100%;
  height:120%;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  filter:brightness(0.5);
  z-index:0;
}

/* DARK OVERLAY */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #0a0a0a);
}

/* TEXT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:800px;
}

h1{
  font-size:64px;
  letter-spacing:2px;
}

.gold{
  color:#c9a34e;
}

p{
  margin-top:10px;
  opacity:0.8;
}

/* TEXT ANIMATION */
.reveal span{
  display:inline-block;
  opacity:0;
  transform:translateY(40px);
}

/* SPACING SECTION */
.spacer{
  height:60vh;
  background:#0a0a0a;
}
</style>
</head>

<body>

<!-- SCENE 1 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1559526324-593bc073d938')"></div>
  <div class="content">
    <h1 class="reveal">RISING <span class="gold">RUPEES</span></h1>
    <p>The new era of Indian power</p>
  </div>
</section>

<div class="spacer"></div>

<!-- SCENE 2 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1507679799987-c73779587ccf')"></div>
  <div class="content">
    <h1 class="reveal">MARKETS MOVE</h1>
    <p>Fortunes rise. Empires fall.</p>
  </div>
</section>

<div class="spacer"></div>

<!-- SCENE 3 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c')"></div>
  <div class="content">
    <h1 class="reveal">WEALTH IS <span class="gold">ENGINEERED</span></h1>
    <p>For those who understand the system</p>
  </div>
</section>

<div class="spacer"></div>

<!-- SCENE 4 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')"></div>
  <div class="content">
    <h1 class="reveal">INDIA IS RISING</h1>
    <p>Not growing. Accelerating.</p>
  </div>
</section>

<div class="spacer"></div>

<!-- SCENE 5 -->
<section class="section">
  <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')"></div>
  <div class="content">
    <h1 class="reveal">THIS IS A <span class="gold">MOVEMENT</span></h1>
    <p>Not just content</p>
  </div>
</section>

<script>
/* SMOOTH SCROLL */
const lenis = new Lenis({
  duration: 1.2,
  smooth: true
});

function raf(time) {
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* TEXT REVEAL */
const reveals = document.querySelectorAll('.reveal');

reveals.forEach(el => {
  let text = el.innerHTML;
  el.innerHTML = text.split("").map(char => `<span>${char}</span>`).join("");
});

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      let spans = entry.target.querySelectorAll('span');
      spans.forEach((span, i) => {
        span.style.transition = "0.6s ease";
        span.style.transitionDelay = i * 0.05 + "s";
        span.style.opacity = 1;
        span.style.transform = "translateY(0)";
      });
    }
  });
},{threshold:0.5});

reveals.forEach(el => observer.observe(el));

/* PARALLAX DEPTH */
window.addEventListener("scroll", () => {
  document.querySelectorAll('.bg').forEach(bg => {
    let speed = 0.3;
    let offset = window.scrollY * speed;
    bg.style.transform = `translateY(${offset}px) scale(1.1)`;
  });
});
</script>

</body>
</html>
